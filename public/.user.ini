; Limites d'upload PHP (lu par PHP-FPM / CGI, ex. Nginx ou Apache+FPM)
; Nécessaire car les directives php_value du .htaccess sont ignorées hors mod_php.
; upload_max_filesize et post_max_size sont PHP_INI_PERDIR : OK depuis .user.ini.
upload_max_filesize = 512M
post_max_size = 520M
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
